<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – Better Athlete Plan</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="auth.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #ff8c00; --orange-d: #e07800;
      --bg: #080810; --bg2: #0f0f1c; --surface: #13131f;
      --border: rgba(255,140,0,.18); --text: #e8e8f0;
      --muted: #7878a0; --error: #ff4d6a; --success: #00d68f;
    }
    html, body {
      min-height: 100vh; background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,140,0,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,140,0,.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 0%, rgba(255,140,0,.1), transparent 70%);
    }
    .card {
      position: relative; z-index: 1;
      width: min(420px, 92vw);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 44px 40px 40px;
      box-shadow: 0 32px 80px rgba(0,0,0,.6);
      animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--orange); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; color: var(--text); }
    .logo-text span { color: var(--orange); }
    h1 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
    .fg { margin-bottom: 16px; }
    .fg label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .pw-wrap { position: relative; }
    input[type="password"], input[type="text"] {
      width: 100%; padding: 11px 14px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      transition: border .2s, box-shadow .2s; outline: none;
    }
    input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,140,0,.12); }
    input::placeholder { color: #3a3a5a; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 4px;
    }
    .strength-bar { height: 4px; border-radius: 2px; background: var(--bg2); margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width .3s, background .3s; width: 0; }
    .strength-label { font-size: 11px; margin-top: 5px; }
    .btn-primary {
      width: 100%; padding: 13px; background: var(--orange); color: #000;
      border: none; border-radius: 10px;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background .2s, transform .1s; margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover { background: var(--orange-d); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .alert { border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
    .alert.error   { background: rgba(255,77,106,.12); border: 1px solid rgba(255,77,106,.3); color: #ff7d96; display: block; }
    .alert.success { background: rgba(0,214,143,.12); border: 1px solid rgba(0,214,143,.3); color: var(--success); display: block; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,.3); border-top-color: #000; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .req-list { list-style: none; margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
    .req-list li { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 7px; transition: color .2s; }
    .req-list li.met { color: var(--success); }
    .req-list li::before { content: '○'; font-size: 10px; }
    .req-list li.met::before { content: '●'; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">🏀</div>
      <div class="logo-text">Better.<span>Athlete</span></div>
    </div>

    <h1>Set New Password</h1>
    <p class="subtitle">Choose a strong password for your account.</p>

    <div class="alert" id="alert"></div>

    <div id="form-body">
      <div class="fg">
        <label>New Password</label>
        <div class="pw-wrap">
          <input type="password" id="new-pw" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength()" />
          <button class="pw-toggle" type="button" onclick="togglePw('new-pw')">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label" style="color:var(--muted)"></div>
        <ul class="req-list" id="req-list">
          <li id="req-len">At least 8 characters</li>
          <li id="req-upper">One uppercase letter</li>
          <li id="req-num">One number</li>
          <li id="req-special">One special character</li>
        </ul>
      </div>
      <div class="fg">
        <label>Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" id="confirm-pw" placeholder="Repeat password" autocomplete="new-password" oninput="checkMatch()" />
          <button class="pw-toggle" type="button" onclick="togglePw('confirm-pw')">👁</button>
        </div>
        <div id="match-label" style="font-size:12px;margin-top:5px;"></div>
      </div>

      <button class="btn-primary" id="save-btn" onclick="savePassword()">
        <span class="spinner" id="spinner"></span>
        <span id="btn-label">Update Password</span>
      </button>
    </div>

    <div id="success-body" style="display:none;text-align:center;padding:12px 0;">
      <div style="font-size:48px;margin-bottom:16px;">✅</div>
      <h2 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:8px;">Password Updated!</h2>
      <p style="color:var(--muted);font-size:14px;margin-bottom:24px;">You can now sign in with your new password.</p>
      <a href="login.html" style="display:inline-block;background:var(--orange);color:#000;padding:12px 32px;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;text-decoration:none;">Go to Sign In →</a>
    </div>
  </div>

  <script>
    // Supabase detects the access_token in the URL hash automatically
    // when detectSessionInUrl: true (set in auth.js)

    function togglePw(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    function checkStrength() {
      const pw = document.getElementById('new-pw').value;
      const reqs = {
        len:     pw.length >= 8,
        upper:   /[A-Z]/.test(pw),
        num:     /[0-9]/.test(pw),
        special: /[^A-Za-z0-9]/.test(pw),
      };
      Object.entries(reqs).forEach(([k, v]) => {
        document.getElementById('req-' + k)?.classList.toggle('met', v);
      });
      const score = Object.values(reqs).filter(Boolean).length;
      const fill  = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      const levels = [
        { pct: 0,   color: 'transparent', text: '' },
        { pct: 25,  color: '#ff4d6a',     text: 'Weak' },
        { pct: 50,  color: '#ffcc00',     text: 'Fair' },
        { pct: 75,  color: '#4da6ff',     text: 'Good' },
        { pct: 100, color: '#00d68f',     text: 'Strong' },
      ];
      fill.style.width      = levels[score].pct + '%';
      fill.style.background = levels[score].color;
      label.textContent     = levels[score].text;
      label.style.color     = levels[score].color;
      checkMatch();
    }

    function checkMatch() {
      const pw  = document.getElementById('new-pw').value;
      const cpw = document.getElementById('confirm-pw').value;
      const el  = document.getElementById('match-label');
      if (!cpw) { el.textContent = ''; return; }
      if (pw === cpw) { el.style.color = 'var(--success)'; el.textContent = '✓ Passwords match'; }
      else            { el.style.color = 'var(--error)';   el.textContent = '✗ Passwords do not match'; }
    }

    async function savePassword() {
      const pw  = document.getElementById('new-pw').value;
      const cpw = document.getElementById('confirm-pw').value;
      const alert = document.getElementById('alert');
      alert.className = 'alert';

      if (pw.length < 8)  { showAlert('Password must be at least 8 characters.'); return; }
      if (pw !== cpw)     { showAlert('Passwords do not match.'); return; }

      document.getElementById('save-btn').disabled = true;
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('btn-label').style.opacity = '0';

      try {
        const { error } = await BAPAuth.getClient().auth.updateUser({ password: pw });
        if (error) throw error;
        document.getElementById('form-body').style.display    = 'none';
        document.getElementById('success-body').style.display = 'block';
      } catch (err) {
        showAlert(err.message || 'Failed to update password. The reset link may have expired.');
        document.getElementById('save-btn').disabled = false;
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('btn-label').style.opacity = '1';
      }
    }

    function showAlert(msg) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'alert error';
    }
  </script>
</body>
</html>
